syntax = "proto3";

package runko.v1;

option go_package = "github.com/saxocellphone/runko/runkod/proto/gen/runko/v1;runkov1";

// SearchService mirrors the MCP search_code tool and runkod's GET
// /api/search (§8.2, §11 Zoekt). See proto/README.md.
service SearchService {
  rpc SearchCode(SearchCodeRequest) returns (SearchCodeResponse);
}

message SearchCodeRequest {
  string query = 1;
  string project = 2; // optional: scope to one project
  int32 page_size = 3;
  string page_token = 4;
}

message SearchHit {
  string path = 1;
  string project_id = 2;
  int32 line = 3;
  string preview = 4;
}

message SearchCodeResponse {
  repeated SearchHit hits = 1;
  string next_page_token = 2;
}
