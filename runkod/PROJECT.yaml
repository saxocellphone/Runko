# The write-path daemon (smart-HTTP git, pre-receive funnel, REST/Connect
# APIs, webhook outbox, mirror worker) plus its binaries under cmd/
# (runkod itself and the runko-bridge CI shim).
#
# Checks are OWNED here (§14.9): scoped to //runkod/..., pg tests ride
# runkod-test via the DSN passthrough. -race matters here - the daemon is
# the concurrent surface (land races, outbox worker, mirror worker).
schema: project/v1
name: runkod
type: service
language: go
dependencies:
  - platform
  - internal
  - db
  - proto
ci:
  checks:
    - name: runkod-test
      command: bazel test --test_env=RUNKO_TEST_DATABASE_URL --test_output=errors //runkod/...
    - name: runkod-race
      command: bazel test --@rules_go//go/config:race --test_output=errors //runkod/...
    - name: bazel-check
      command: make check-bazel
