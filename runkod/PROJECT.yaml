# The write-path daemon (smart-HTTP git, pre-receive funnel, REST/Connect
# APIs, webhook outbox, mirror worker) plus its binaries under cmd/
# (runkod itself and the runko-deployer GitOps pinner; the runko-bridge CI
# shim was carved into its own top-level project 2026-07-22).
#
# Checks are OWNED here (§14.9): scoped to //runkod/..., pg tests ride
# runkod-test via the DSN passthrough. -race matters here - the daemon is
# the concurrent surface (land races, outbox worker, mirror worker).
#
# rpc (§13.3.1): this project serves in-boundary contracts - sources at
# proto/ (runko/v1, the web surface, migrated from the dissolved
# standalone proto project 2026-07-15; mailer/v1, the invite feed),
# committed codegen at proto/gen/. Consumers declare a consumes edge;
# receive enforces it.
schema: project/v1
name: runkod
type: service
language: go
capabilities:
  - rpc
  - deploy
capability_config:
  rpc:
    path: proto
  # deploy (§14.10, docs/spec/deploy/README.md): runkod OWNS the runkod
  # image - a multi-binary image. The mailer and watchdog binaries ship
  # inside it, so those projects RIDE this image (each declares a workload
  # with image: runkod). runko-bridge now RIDES it the same way from its own
  # project. runko-deployer ships in it too but lives inside runkod's OWN
  # boundary (no separate project), so its changes are runkod changes
  # already - no rider edge needed.
  deploy:
    image:
      name: runkod
      context: .
      dockerfile: Dockerfile
dependencies:
  - platform
  - internal
  - db
ci:
  checks:
    - name: runkod-test
      command: bazel test --test_env=RUNKO_TEST_DATABASE_URL --test_output=errors //runkod/...
    - name: runkod-race
      command: bazel test --@rules_go//go/config:race --test_output=errors //runkod/...
      # §14.5.9: race verification is an own-code class - the -test lane
      # stays affected-class and remains the integration surface dependents
      # exercise (httptest + compiled-binary e2e + pg).
      run_when: direct
    - name: bazel-check
      command: make check-bazel
