# The client binaries: runko (human/agent CLI) and runko-ci (CI-facing
# CLI). Pure main packages over the platform libraries.
schema: project/v1
name: cli
type: app
language: go
dependencies:
  - platform
  - internal
ci:
  checks:
    - name: platform-check
      command: make check-bazel-test
    - name: platform-race
      command: make check-bazel-race
    - name: platform-db
      command: make check-db
    - name: bazel-check
      command: make check-bazel
