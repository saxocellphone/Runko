# The client binaries: runko (human/agent CLI) and runko-ci (CI-facing
# CLI). Pure main packages over the platform libraries.
#
# Checks are OWNED here (§14.9): scoped to //cli/... . No -race check on
# purpose (race-where-it-matters): these are sequential CLIs - the
# concurrent surfaces (land engine, daemon) carry their own race checks,
# and a change touching platform code pulls those in via the closure.
schema: project/v1
name: cli
type: app
language: go
# release (§14.10.3): the CLI is the platform's first released project -
# `runko release create --project cli` cuts cli/vX.Y.Z with a changelog
# derived from the landed Changes touching this folder.
# deploy.binaries (docs/spec/deploy/README.md, 2026-07-24): the rolling
# cli-latest GitHub release. `runko-ci binaries` republishes it whenever
# THIS project is in the affected closure - the manifest's dependency and
# consumes edges above are the whole trigger rule, replacing the
# binary-release workflow's hand-maintained project list (paths default
# to cli/runko and cli/runko-ci).
capabilities:
  - release
  - deploy
capability_config:
  deploy:
    binaries:
      tag: cli-latest
      items:
        - name: runko
        - name: runko-ci
dependencies:
  - platform
  - internal
# consumes (§13.3.1, 2026-07-14 re-evaluation): both binaries are REST
# clients of the daemon (docs/cli-contract.md pins the surface). Until
# runkod carries an OpenAPI artifact for its REST API (recorded
# follow-up), this edge triggers on runkod/proto/** and runkod's
# manifest only - declared now for honest topology, real closure value
# when the artifact lands.
consumes:
  - runkod
ci:
  checks:
    - name: cli-test
      command: bazel test --test_output=errors //cli/...
    - name: bazel-check
      command: make check-bazel
