syntax = "proto3";

package runko.v1;

option go_package = "github.com/saxocellphone/runko/gen/runko/v1;runkov1";

import "runko/v1/common.proto";

// ProjectService mirrors the navigation-category MCP tools (§17.4) and
// runkod's GET /api/projects (§28.3 stage 12) - same underlying data, one
// more transport. See proto/README.md.
service ProjectService {
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc WhoOwns(WhoOwnsRequest) returns (WhoOwnsResponse);
}

message ListProjectsRequest {
  string query = 1; // optional substring filter on name or path
  int32 page_size = 2;
  string page_token = 3;
}

message ListProjectsResponse {
  repeated ProjectSummary projects = 1;
  string next_page_token = 2;
}

message GetProjectRequest {
  string project = 1; // project id or name
}

// WhoOwnsRequest resolves owners for a path OR a project - exactly one,
// matching the MCP tool's oneOf(path, project) (§7.3).
message WhoOwnsRequest {
  oneof target {
    string path = 1;
    string project = 2;
  }
}

message GetProjectResponse {
  ProjectDetail project = 1;
}

message WhoOwnsResponse {
  OwnersResult owners = 1;
}
