syntax = "proto3";

package runko.v1;

option go_package = "github.com/saxocellphone/runko/proto/gen/runko/v1;runkov1";

import "runko/v1/common.proto";

// ProjectService mirrors the navigation-category MCP tools (§17.4) and
// runkod's GET /api/projects (§28.3 stage 12) - same underlying data, one
// more transport. See proto/README.md.
service ProjectService {
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc WhoOwns(WhoOwnsRequest) returns (WhoOwnsResponse);
  // PreviewCreateProject runs the intent -> files pipeline (§10.1) without
  // applying anything: the exact files CreateProject would commit, so the
  // UI can show them live while the form is being filled. Validation
  // failures are INVALID_ARGUMENT with an ErrorDetail (§6.5).
  rpc PreviewCreateProject(PreviewCreateProjectRequest) returns (PreviewCreateProjectResponse);
  // CreateProject applies the plan as one commit and registers it as an
  // ordinary open Change - trunk stays closed to direct writes (§6.9), so
  // the project becomes real by LANDING that Change through the normal
  // §13.5 gates. This is the MCP catalog's create_project semantics
  // (deferred-v1.x there); the web UI is the first remote-write client
  // that needed it (§8.5, §10.2). Duplicate name/path is ALREADY_EXISTS.
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
}

// CreateProjectIntent is the L0-only create request (§10.1, §8.5),
// mirroring common.schema.json#/$defs/CreateProjectIntent and
// project.Intent: name + type is a complete request; everything else is
// optional and inherited/derived (anti-Boq, §2.3).
message CreateProjectIntent {
  string name = 1;
  string type = 2;            // library|service|app|job|other (§7.2)
  repeated string owners = 3; // empty -> inherited via §7.3 resolution
  string template_id = 4;     // empty -> the (type, language) default template
  string path = 5;            // empty -> derived from name
  string language = 6;        // empty -> the default (Go) templates; recorded in PROJECT.yaml verbatim, never default-filled (§10.4)
  bool no_template = 7;       // escape hatch (§10.4): PROJECT.yaml + README only, any well-formed language recorded as-is
  string build_engine = 8;    // bazel|vite|none; empty -> language default (ts -> vite, else bazel; §14.5.5)
}

message PreviewCreateProjectRequest {
  CreateProjectIntent intent = 1;
}

message PlannedFile {
  string path = 1;   // project-root-relative
  string action = 2; // "create" | "modify"
  string content = 3;
}

message PreviewCreateProjectResponse {
  string path = 1; // resolved repo-root-relative project root
  repeated PlannedFile files = 2;
}

message CreateProjectRequest {
  CreateProjectIntent intent = 1;
}

message CreateProjectResponse {
  // The open Change carrying the new project's files. Land it (§13.5) and
  // the project appears on trunk; abandon it and nothing ever existed.
  ChangeSummary change = 1;
}

message ListProjectsRequest {
  string query = 1; // optional substring filter on name or path
  int32 page_size = 2;
  string page_token = 3;
}

message ListProjectsResponse {
  repeated ProjectSummary projects = 1;
  string next_page_token = 2;
}

message GetProjectRequest {
  string project = 1; // project id or name
}

// WhoOwnsRequest resolves owners for a path OR a project - exactly one,
// matching the MCP tool's oneOf(path, project) (§7.3).
message WhoOwnsRequest {
  oneof target {
    string path = 1;
    string project = 2;
  }
}

message GetProjectResponse {
  ProjectDetail project = 1;
}

message WhoOwnsResponse {
  OwnersResult owners = 1;
}
