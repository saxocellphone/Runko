# Codegen config for the GO side (connect-go handlers in runkod, stage 13's
# server half). Run from proto/ with the plugins on PATH (~/go/bin):
#
#   go install google.golang.org/protobuf/cmd/protoc-gen-go
#   go install connectrpc.com/connect/cmd/protoc-gen-connect-go
#   go run github.com/bufbuild/buf/cmd/buf@latest generate
#
# Output is committed at ../gen (the internal/dbgen convention): consumers
# and CI never need buf/protoc, only regeneration after a .proto edit does.
# `out: ../gen` + paths=source_relative lands files at gen/runko/v1, which
# is exactly what every file's go_package option
# (github.com/saxocellphone/runko/gen/runko/v1) declares - the original
# draft's `out: ../gen/go` + remote plugins put them one directory off from
# their own import path and needed network access to buf.build.
#
# TypeScript generation for the web frontend does NOT live here:
# it runs from web/ via `npm run gen` (web/buf.gen.yaml, local
# protoc-gen-es). Note protobuf-es v2 subsumed the old connect-es plugin -
# a `buf.build/connectrpc/es` entry (this file's original draft) is the
# deprecated v1 pair and must not come back; connect-es v2 consumes plain
# protoc-gen-es output.
version: v2
inputs:
  - directory: .
plugins:
  - local: protoc-gen-go
    out: ../gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../gen
    opt: paths=source_relative
