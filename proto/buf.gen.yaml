# Codegen config for the GO side only (connect-go handlers for runkod,
# still unimplemented - stage 13's server half). Draft, untested here.
#
# TypeScript generation for the web frontend does NOT live here anymore:
# it runs from web/ via `npm run gen` (web/buf.gen.yaml, local
# protoc-gen-es). Note protobuf-es v2 subsumed the old connect-es plugin -
# a `buf.build/connectrpc/es` entry (this file's original draft) is the
# deprecated v1 pair and must not come back; connect-es v2 consumes plain
# protoc-gen-es output.
version: v2
inputs:
  - directory: .
plugins:
  - remote: buf.build/connectrpc/go
    out: ../gen/go
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/go
    out: ../gen/go
    opt: paths=source_relative
