# Root glue project: owns only what no deeper PROJECT.yaml claims -
# go.mod, Makefile, Dockerfile, MODULE.bazel, .github/, scripts/, and the
# top-level docs. The Go/TS code all lives in real per-folder projects
# (platform/, runkod/, cli/, internal/, db/, proto/, web/, docs/); this
# manifest exists so repo-glue changes still resolve a merge policy
# instead of falling to the fail-closed unowned-path default.
schema: project/v1
name: repo
type: other
ci:
  checks:
    - name: platform-check
      command: make check-bazel-test
    - name: platform-race
      command: make check-bazel-race
    - name: platform-db
      command: make check-bazel-db
    - name: bazel-check
      command: make check-bazel
