# Root glue project: owns only what no deeper PROJECT.yaml claims -
# go.mod, Makefile, Dockerfile, MODULE.bazel, .github/, scripts/, and the
# top-level docs. The Go/TS code all lives in real per-folder projects
# (platform/, runkod/, cli/, internal/, db/, proto/, web/, docs/); this
# manifest exists so repo-glue changes still resolve a merge policy
# instead of falling to the fail-closed unowned-path default.
#
# Two-tier gating (§14.5.2/§14.5.7, tree-borne per §9.4), escalation and
# de-escalation as duals: root BUILD-SENSITIVE files are enumerated in
# root_invalidation - touching one escalates affected computation to
# run_everything, which requires every project's checks and rebuilds every
# artifact. PROSE paths (markdown anywhere, LICENSE, doc images) go the
# other way: they re-attribute to THIS project for check derivation, so a
# doc edit - even inside platform/ or web/ - requires only docs-check
# (seconds) instead of its folder-owner's test matrix and dependency
# closure. Load-bearing docs that tests consume as data are !-excepted
# from prose and covered by the docs project's contracts-test; owners are
# derived from raw touched paths and never de-escalated.
schema: project/v1
name: repo
type: other
prose:
  - "!docs/spec/**"          # contract schemas: runfiles of platform's contract tests
  - "!docs/cli-contract.md"  # agentsmd drift-test input
  - "**/*.md"
  - LICENSE
  - docs/images/**
# Two classes (§14.5.8): GRAPH-VISIBLE entries carry {refinable: true} -
# a successful bazel snapshot diff (target-determinator) may replace their
# run_everything with the exact impacted-target set, consumed ONLY by
# post-land ci.yml's resolve (runko-ci checks --engine bazel; the merge
# gate never narrows). Out-of-graph entries (Makefile, Docker, sqlc,
# workflows, scripts) stay blunt strings permanently - no build graph can
# see them, so nothing can vouch for a narrower blast radius.
root_invalidation:
  - pattern: go.mod
    refinable: true
  - pattern: go.sum
    refinable: true
  - pattern: MODULE.bazel
    refinable: true
  - pattern: MODULE.bazel.lock
    refinable: true
  - pattern: BUILD.bazel
    refinable: true
  - pattern: .bazelrc
    refinable: true
  - pattern: .bazelversion
    refinable: true
  - pattern: .bazelignore
    refinable: true
  - Makefile
  - Dockerfile
  - .dockerignore
  - docker-compose.yml
  - sqlc.yaml
  # ci.yml is POST-LAND-ONLY (§14.5.8): it executes after landing, so no
  # edit to it can change a pre-land check's validity - escalating on it
  # buys nothing (no pre-land check exercises workflow files at all). What
  # still gates it: owner review + docs-check pre-land, and the workflow
  # run itself post-land (a broken ci.yml fails loudly on its own first
  # execution against trunk). First-match-wins: the exception must precede
  # the ".github/**" it carves.
  - "!.github/workflows/ci.yml"
  - .github/**
  - scripts/**
# The content tier: prose-attributed paths (and root glue like .gitignore)
# need a real, fast check for default-deny (§13.5) - the link checker, not
# the build graph. Build-sensitive root files hit root_invalidation above
# and run everything anyway.
ci:
  checks:
    - name: docs-check
      command: make check-docs
