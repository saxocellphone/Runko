# Root glue project: owns only what no deeper PROJECT.yaml claims -
# go.mod, Makefile, Dockerfile, MODULE.bazel, .github/, scripts/, and the
# top-level docs. The Go/TS code all lives in real per-folder projects
# (platform/, runkod/, cli/, internal/, db/, proto/, web/, docs/); this
# manifest exists so repo-glue changes still resolve a merge policy
# instead of falling to the fail-closed unowned-path default.
#
# Two-tier gating (§14.5.2, tree-borne per §9.4): root CONTENT (README,
# CLAUDE.md, LICENSE...) requires only bazel-check - a prose edit must not
# run the Go test matrix. Root BUILD-SENSITIVE files are enumerated in
# root_invalidation below: touching one escalates affected computation to
# run_everything, which requires every project's checks and rebuilds every
# artifact - fail-closed exactly where it matters.
schema: project/v1
name: repo
type: other
root_invalidation:
  - go.mod
  - go.sum
  - MODULE.bazel
  - MODULE.bazel.lock
  - BUILD.bazel
  - .bazelrc
  - .bazelversion
  - .bazelignore
  - Makefile
  - Dockerfile
  - .dockerignore
  - docker-compose.yml
  - sqlc.yaml
  - .github/**
  - scripts/**
ci:
  checks:
    - name: bazel-check
      command: make check-bazel
