# Build + push the deployable images to GHCR on every push to main
# (consumed by the k8s-cluster GitOps repo's apps/monorepo-platform),
# then pin the new digests INTO that repo (deploy-bump below) so Argo CD
# deploys them - no manual rollout step. Tags: :latest (dev-follow) and
# :sha-<commit> (pinnable); the cluster runs the digest pins. Image
# builds use the workflow's own GITHUB_TOKEN; only the k8s-cluster
# write-back needs a PAT (K8S_CLUSTER_TOKEN).
#
# AFFECTED-SCOPED (§14.5): a `scope` job computes which projects the landed
# range touched (runko-ci affected, the same computation the pre-land
# checks use) and each image builds ONLY when its own inputs changed - a
# docs-only landing rebuilds nothing, a web-only landing rebuilds only web.
# run_everything (or a first push with no `before`) rebuilds everything.
# Image input sets (a project + its transitive dependencies). `repo` is
# deliberately absent: root CONTENT (README...) affects no artifact, and
# root BUILD-SENSITIVE files (Dockerfile, go.mod, .github/**) escalate to
# run_everything via the root manifest's root_invalidation patterns, which
# rebuilds everything through the RunEverything branch:
#   runkod  <- runkod, platform, internal, db, proto
#   web     <- web, proto
#   cli     <- cli, platform, internal, db (GitHub binary release,
#              not an image - the rolling `cli-latest` release below)
name: Release images

on:
  push:
    branches: [main]

permissions:
  # contents: write is for the rolling cli-latest release (tag + assets);
  # main itself stays untouchable (the freeze ruleset targets the branch).
  contents: write
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      runkod: ${{ steps.affected.outputs.runkod }}
      web: ${{ steps.affected.outputs.web }}
      cli: ${{ steps.affected.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: which images need rebuilding
        id: affected
        run: |
          RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)
          BEFORE='${{ github.event.before }}'
          # First push to a branch, a forced push, or an unknown base: build
          # everything. github.event.before is all-zeros in those cases.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "runkod=true" >> "$GITHUB_OUTPUT"; echo "web=true" >> "$GITHUB_OUTPUT"; echo "cli=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          AFF=$(go run "$RUNKO_CI_PKG" affected --base "$BEFORE" --head '${{ github.sha }}')
          echo "$AFF"
          if [ "$(echo "$AFF" | jq -r '.RunEverything')" = "true" ]; then
            echo "runkod=true" >> "$GITHUB_OUTPUT"; echo "web=true" >> "$GITHUB_OUTPUT"; echo "cli=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          NAMES=$(echo "$AFF" | jq -r '[.Projects[].Name] | join(" ")')
          runkod=false; web=false; cli=false
          for n in $NAMES; do
            case "$n" in
              runkod|platform|internal|db|proto) runkod=true ;;
            esac
            case "$n" in
              web|proto) web=true ;;
            esac
            case "$n" in
              cli|platform|internal|db) cli=true ;;
            esac
          done
          echo "runkod=$runkod" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "cli=$cli" >> "$GITHUB_OUTPUT"

  images:
    needs: scope
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: runkod
            context: .
            dockerfile: Dockerfile
            build_args: ""
            needed: ${{ needs.scope.outputs.runkod }}
          - name: web
            context: web
            dockerfile: web/Dockerfile
            # "/" = same-origin: the cluster ingress path-routes
            # /runko.v1.* to runkod and everything else to this image, so
            # the deployed UI is LIVE by default (the demo stays at
            # /demo). NEVER add VITE_RUNKO_TOKEN here - Vite inlines it
            # into the public bundle; tokens are per-browser at runtime.
            build_args: |
              VITE_RUNKO_URL=/
            needed: ${{ needs.scope.outputs.web }}
    steps:
      - if: matrix.needed != 'true'
        run: echo "::notice::${{ matrix.name }} image unaffected by this landing - skipping rebuild"

      - if: matrix.needed == 'true'
        uses: actions/checkout@v4

      - if: matrix.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - if: matrix.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.needed == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:latest
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      # Hand the digest to deploy-bump below. An artifact per matrix leg,
      # not a job output - matrix legs writing the same output clobber
      # each other.
      - if: matrix.needed == 'true'
        name: record image digest for the GitOps bump
        run: |
          mkdir -p digest
          printf '%s' "${{ steps.build.outputs.digest }}" > "digest/${{ matrix.name }}"
      - if: matrix.needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: digest/${{ matrix.name }}

  # GitOps write-back - §14.10.2's image-bump-bot pattern applied to our
  # own deploy loop: pin the just-built digests into the k8s-cluster repo's
  # kustomization, and Argo CD (auto-sync + selfHeal on the
  # monorepo-platform app) rolls the deployments. Event-driven and audited:
  # every deploy is a k8s-cluster commit naming the runko commit that
  # produced it, and rollback is `git revert` there. Replaces the manual
  # `kubectl rollout restart` step; the deployments' manifests keep
  # `:latest` as the readable name while kustomize's images transformer
  # pins the digest actually served (runko-bridge rides the runkod image
  # and bumps with it). Mid-push daemon restarts are self-healing
  # (PruneDanglingChangeRefs at boot, migration-findings #34).
  #
  # No-ops with a notice until the K8S_CLUSTER_TOKEN secret exists: a
  # fine-grained PAT with Contents read/write on saxocellphone/k8s-cluster.
  deploy-bump:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: check for the k8s-cluster token
        id: tok
        env:
          TOKEN: ${{ secrets.K8S_CLUSTER_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::K8S_CLUSTER_TOKEN not configured - skipping the GitOps image bump (deploys stay manual)"
          fi
      - if: steps.tok.outputs.have == 'true'
        uses: actions/download-artifact@v4
        # Fails when no artifact matches (nothing was rebuilt) - that is
        # the no-op case, tolerated and re-checked in the next step.
        continue-on-error: true
        with:
          pattern: digest-*
          path: digests
      - if: steps.tok.outputs.have == 'true'
        name: anything rebuilt?
        id: any
        run: |
          if ls digests/digest-*/* >/dev/null 2>&1; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::no images rebuilt by this landing - nothing to bump"
          fi
      - if: steps.any.outputs.yes == 'true'
        uses: actions/checkout@v4
        with:
          repository: saxocellphone/k8s-cluster
          token: ${{ secrets.K8S_CLUSTER_TOKEN }}
          path: k8s-cluster
      - if: steps.any.outputs.yes == 'true'
        name: pin digests and push
        run: |
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar -xz -C "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE/k8s-cluster/apps/monorepo-platform"
          for f in "$GITHUB_WORKSPACE"/digests/digest-*/*; do
            name=$(basename "$f"); digest=$(cat "$f")
            [ -n "$digest" ] || continue
            "$GITHUB_WORKSPACE/kustomize" edit set image \
              "ghcr.io/saxocellphone/runko/${name}=ghcr.io/saxocellphone/runko/${name}@${digest}"
            echo "pinned ${name} -> ${digest}"
          done
          cd "$GITHUB_WORKSPACE/k8s-cluster"
          git diff --quiet && { echo "digests unchanged (image content identical) - no commit"; exit 0; }
          git config user.name "runko-release"
          git config user.email "runko-release@users.noreply.github.com"
          git add apps/monorepo-platform/kustomization.yaml
          git commit -m "monorepo-platform: image bump from runko@${GITHUB_SHA:0:9}" \
            -m "Automated GitOps write-back from the Runko release-images run: pins the just-built image digest(s); Argo CD rolls the deployments. Provenance: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # This workflow's concurrency group serializes its own runs; the
          # rebase-retry covers a human pushing to k8s-cluster concurrently.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          echo "could not push the bump after 3 attempts" >&2
          exit 1

  # Rolling GitHub binary release for the CLIs (runko + runko-ci): rebuilt
  # whenever the cli input set changed, published as the `cli-latest`
  # release with per-platform assets + checksums. The tag exists only on
  # GitHub (the mirror pushes runko-side tags and never prunes foreign
  # ones, so no divergence is possible). `go install .../cli/runko@latest`
  # remains the from-source alternative.
  cli-release:
    needs: scope
    if: needs.scope.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: cross-compile runko + runko-ci
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${target%/*}; GOARCH=${target#*/}
            EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
            for bin in runko runko-ci; do
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/${bin}_${GOOS}_${GOARCH}${EXT}" "./cli/${bin}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist/
      - name: publish rolling cli-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete cli-latest --cleanup-tag -y || true
          gh release create cli-latest \
            --target "${{ github.sha }}" \
            --title "runko CLI (rolling, main @ ${GITHUB_SHA:0:9})" \
            --notes "Rolling build of the \`runko\` and \`runko-ci\` CLIs from main @ ${GITHUB_SHA:0:9}. Updated automatically whenever a landing affects the CLI or its dependencies. Verify with checksums.txt. From source: \`go install github.com/saxocellphone/runko/cli/runko@latest\`." \
            dist/*
