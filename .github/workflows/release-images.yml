# Build + push the deployable images to GHCR for a landed commit, then PIN
# each freshly-built digest into the k8s-cluster GitOps repo. Argo CD watches
# that repo (automated sync) and reconciles the cluster - nothing here touches
# Kubernetes. Runko builds and records the desired digest in git; Argo deploys.
#
# GitOps-shaped CD, fully generic: the pin TARGET (which repository, which
# kustomization) comes from the root manifest's deploy_gitops via `runko-ci
# images` - this file hardcodes no repository, path, or org. A repo whose
# root declares no deploy_gitops skips the pin job entirely. (The shipped
# tenant template, templates/ci/runko-images.yml, reports digests to a runkod
# deploy record instead - two documented CD shapes, one build half.)
#
# DISPATCH-TRIGGERED, PER LAND: runkod emits a `runko-image-build`
# repository_dispatch on every change.landed (runkod/githubdispatch.go),
# carrying the landed head_sha. This workflow builds exactly that commit's
# affected images - a tight head^..head delta per land.
#
# FULLY GENERIC BUILD: which images, and each one's FULL registry-qualified ref
# (image_ref), context, dockerfile, and build_args all come from
# `runko-ci images`, which reads the tree's `deploy.image` declarations and the
# root's `deploy_registry`. Adding/renaming an image is a single-manifest
# change; only the `pin` job below (GitOps write-back) is Runko-specific.
#
# Secrets: RUNKO_GITHUB_APP_ID + RUNKO_GITHUB_APP_PRIVATE_KEY - the existing
# runkogithubapp (already used for the outbound mirror, so it has Contents:write),
# which must also be installed on saxocellphone/k8s-cluster. The pin job mints a
# per-run installation token (actions/create-github-app-token) SCOPED to just
# k8s-cluster - no long-lived PAT, no user-owned credential. GHCR push uses the
# default GITHUB_TOKEN.
name: Release images

run-name: "images: ${{ github.event.client_payload.change_id }}@${{ github.event.client_payload.head_sha }}"

on:
  repository_dispatch:
    types: [runko-image-build]

permissions:
  # GHCR image push only. The k8s-cluster checkout authenticates with a
  # short-lived GitHub App installation token (minted in the pin job), not the
  # workflow's GITHUB_TOKEN.
  packages: write

# One in-flight build per landed commit; never cancel a running build.
concurrency:
  group: release-images-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: false

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      # matrix: [{name, image_ref, context, dockerfile, build_args}] from
      # runko-ci images (build_args pre-rendered to newline KEY=VALUE).
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_images: ${{ steps.resolve.outputs.has_images }}
      # The pin target from the root manifest's deploy_gitops (empty -> the
      # pin job is skipped; an org without GitOps-shaped CD declares none).
      gitops_owner: ${{ steps.resolve.outputs.gitops_owner }}
      gitops_name: ${{ steps.resolve.outputs.gitops_name }}
      gitops_repository: ${{ steps.resolve.outputs.gitops_repository }}
      gitops_kustomization: ${{ steps.resolve.outputs.gitops_kustomization }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: check out the landed head (mirror-lag retry)
        run: |
          # The dispatch can beat the debounced mirror push; retry until the
          # landed commit is present, then build exactly it.
          for i in $(seq 1 30); do
            git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null && break
            git fetch --quiet origin main 2>/dev/null || true
            sleep 5
          done
          git checkout -q "$HEAD_SHA"
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: resolve runko-ci (tree copy, or released binary)
        run: |
          if [ -d cli/runko-ci ]; then
            echo "RUNKO_CI=go run ./cli/runko-ci" >> "$GITHUB_ENV"
          else
            base="${RUNKO_CI_DOWNLOAD_URL:-https://github.com/saxocellphone/Runko/releases/download/cli-latest}"
            sudo curl -fsSL -o /usr/local/bin/runko-ci "$base/runko-ci_linux_amd64"
            sudo chmod +x /usr/local/bin/runko-ci
            echo "RUNKO_CI=runko-ci" >> "$GITHUB_ENV"
          fi
      - name: resolve the image matrix from the tree
        id: resolve
        run: |
          # head^..head is the single-land delta. runko-ci images reads
          # deploy.image from the tree and handles run_everything (returns every
          # declared image); no --engine (fail closed).
          BASE="$HEAD_SHA^"
          IMAGES=$($RUNKO_CI images --base "$BASE" --head "$HEAD_SHA")
          echo "$IMAGES" | jq .
          # Pre-render build_args map -> "KEY=VALUE\nKEY2=VALUE2" for
          # docker/build-push-action; empty map -> "". `.images` is null (not
          # []) for a non-deployable land, so coalesce before iterating.
          MATRIX=$(echo "$IMAGES" | jq -c '[(.images // [])[] | {
            name, image_ref, context, dockerfile,
            build_args: ((.build_args // {}) | to_entries | map("\(.key)=\(.value)") | join("\n"))
          }]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_images=$(echo "$IMAGES" | jq -r '.images | length > 0')" >> "$GITHUB_OUTPUT"
          GITOPS_REPO=$(echo "$IMAGES" | jq -r '.gitops.repository // empty')
          echo "gitops_owner=${GITOPS_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "gitops_name=${GITOPS_REPO##*/}" >> "$GITHUB_OUTPUT"
          echo "gitops_repository=$GITOPS_REPO" >> "$GITHUB_OUTPUT"
          echo "gitops_kustomization=$(echo "$IMAGES" | jq -r '.gitops.kustomization // empty')" >> "$GITHUB_OUTPUT"

  images:
    needs: setup
    if: needs.setup.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ${{ matrix.image_ref }}:latest
            ${{ matrix.image_ref }}:sha-${{ env.HEAD_SHA }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
      # One artifact per matrix leg (legs writing the same job output clobber).
      # Carries image_ref alongside the digest so the pin job needs no registry.
      - name: record image ref + digest for the digest pin
        run: |
          mkdir -p report
          # Trailing newline matters: `read` returns 1 at EOF-without-newline,
          # and GitHub's `bash -e` then kills the consuming step instantly with
          # no output (exactly how the retired report job silently died).
          printf '%s %s\n' "${{ matrix.image_ref }}" "${{ steps.build.outputs.digest }}" > "report/${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.name }}
          path: report/${{ matrix.name }}

  # Pin each freshly-built digest into the k8s-cluster GitOps repo. Argo CD
  # (automated sync, selfHeal) reconciles the cluster from git - this job never
  # runs kubectl and holds no cluster credential, only a Contents:write PAT on
  # the one GitOps repo. Runko records the desired digest in git; Argo deploys.
  pin:
    needs: images
    # Pin even if some image legs failed (fail-fast: false), so the digests that
    # DID build reach git; only skip when the images job was skipped entirely (a
    # non-deployable land - nothing to pin).
    if: ${{ !cancelled() && needs.images.result != 'skipped' && needs.setup.outputs.gitops_repository != '' }}
    runs-on: ubuntu-latest
    steps:
      # Full-history checkout of THIS repo: the ancestry guard below compares
      # the landed head against the sha the GitOps repo was last pinned from
      # (merge-base --is-ancestor), so stacked lands whose builds finish out of
      # order can never regress a pin. Must be the FIRST step - checkout cleans
      # the workspace, so it precedes the artifact download.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: wait for the landed head on the mirror (ancestry guard input)
        run: |
          for i in $(seq 1 12); do
            git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null && exit 0
            git fetch --quiet origin main 2>/dev/null || true
            sleep 5
          done
          # Never block a deploy on mirror lag: without the head the guard
          # fails open (pins anyway), which is today's behavior.
          echo "::warning::landed head $HEAD_SHA not on the mirror yet; ancestry guard will fail open"
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: report-*
          path: reports
      # Mint a short-lived installation token scoped to the declared GitOps
      # repository only. No long-lived credential lives in CI - just the
      # App's id + private key, and this token expires within the hour.
      - name: mint a GitOps-repo installation token
        id: app-token
        # SHA-pinned (not @v1): this action handles the App private key, so it
        # gets the strictest supply-chain pin. Bump deliberately.
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.RUNKO_GITHUB_APP_ID }}
          private-key: ${{ secrets.RUNKO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ needs.setup.outputs.gitops_owner }}
          repositories: ${{ needs.setup.outputs.gitops_name }}
      - name: check out the GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.setup.outputs.gitops_repository }}
          token: ${{ steps.app-token.outputs.token }}
          path: gitops
          fetch-depth: 0
      # Pin each digest by editing the images: block with yq (preinstalled on
      # the runner) - no kustomize download, and yq preserves comments and adds
      # no redundant newName. One kustomization entry may serve several
      # projects' workloads (riders share their owner's image).
      - name: pin the built digests into the GitOps repo and push
        env:
          KUST: ${{ needs.setup.outputs.gitops_kustomization }}
        # .pinned-from (computed beside the kustomization below) records the
        # FULL monorepo sha the digests were pinned from - a plain file the
        # reconciler ignores, so a `git revert` of a stale pin restores it
        # along with the digests, unlike anything parsed from commit messages.
        run: |
          shopt -s nullglob
          cd gitops
          PINFROM="$(dirname "$KUST")/.pinned-from"
          # Collect (name, image_ref, digest) from the per-leg artifacts,
          # validating each digest (mirrors the runkod deploy-record guard) -
          # a bad value must never reach git.
          names=(); refs=(); digests=()
          for f in "$GITHUB_WORKSPACE"/reports/report-*/*; do
            # `|| true`: read returns 1 at EOF-without-newline while still
            # filling the vars; without this, bash -e kills the job silently.
            name=$(basename "$f"); read -r image_ref digest < "$f" || true
            [ -n "$digest" ] || continue
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::bad digest for $name: $digest"; exit 1; }
            names+=("$name"); refs+=("$image_ref"); digests+=("$digest")
          done
          if [ ${#digests[@]} -eq 0 ]; then
            echo "::warning::no image leg produced a digest (builds failed?); nothing to pin"
            exit 0
          fi

          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          # Re-apply, NEVER rebase. Rebasing a textual patch of the images:
          # block can conflict and leave a detached HEAD that pushes vacuously -
          # silently dropping the pin while reporting success. Instead, on every
          # attempt reset onto the freshest origin/main and re-apply the
          # SEMANTIC edit (set each image's digest by name; idempotent), commit,
          # push. Rapid out-of-order lands self-correct on the next land, and
          # :sha-<head> tags stay the manual rollback handle.
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            # ANCESTRY GUARD - re-checked on EVERY attempt, against the state
            # just fetched: if the GitOps repo is already pinned from a runko
            # commit that is NOT an ancestor of this run's head, a newer land
            # already pinned (stacked lands' builds finish out of order) -
            # skip rather than regress the deployment. Equal shas pass
            # (idempotent re-run). Unknown shas fail OPEN (pin anyway):
            # a missing/garbled .pinned-from must never block deploys.
            prev=$(cat "$PINFROM" 2>/dev/null || true)
            if [ -n "$prev" ] \
              && git -C "$GITHUB_WORKSPACE" cat-file -e "$prev^{commit}" 2>/dev/null \
              && git -C "$GITHUB_WORKSPACE" cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null; then
              if ! git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$prev" "$HEAD_SHA"; then
                echo "::notice::skipping pin: GitOps repo already pinned from $prev, which is newer than this run's $HEAD_SHA"
                exit 0
              fi
            fi
            for i in "${!digests[@]}"; do
              n=$(yq "[.images[] | select(.name == \"${refs[$i]}\")] | length" "$KUST")
              [ "$n" = "1" ] || { echo "::error::${refs[$i]} has no entry in $KUST images: block - add one"; exit 1; }
              yq -i "(.images[] | select(.name == \"${refs[$i]}\").digest) = \"${digests[$i]}\"" "$KUST"
            done
            printf '%s\n' "$HEAD_SHA" > "$PINFROM"
            git add "$KUST" "$PINFROM"
            if git diff --cached --quiet; then
              echo "digests already current at origin/main - nothing to push"
              break
            fi
            git commit -q -m "$(basename "$(dirname "$KUST")"): pin ${names[*]} from ${GITHUB_REPOSITORY##*/}@${HEAD_SHA:0:9}"
            if git push origin HEAD:main; then
              echo "pushed pin for ${names[*]}"
              break
            fi
            echo "push rejected (attempt $attempt/5); re-applying onto new origin/main"
            [ "$attempt" = 5 ] && { echo "::error::could not push digest pin after 5 attempts"; exit 1; }
          done

          # Backstop against a vacuous push exiting 0: the local kustomization
          # (just committed+pushed, or already matching origin) MUST carry every
          # digest we pinned.
          for i in "${!digests[@]}"; do
            grep -qF "${digests[$i]}" "$KUST" || { echo "::error::pin verification failed: ${names[$i]} (${digests[$i]}) absent from $KUST"; exit 1; }
          done
          echo "pinned + verified: ${names[*]}"
