# Build + push the deployable images to GHCR for a landed commit, then
# report each digest to Runko's deploy record so runko-deployer pins them
# into the GitOps repo and Argo CD rolls (§14.10 inverted CD; no manual
# rollout). GitHub only builds and reports; Runko drives the rollout.
#
# DISPATCH-TRIGGERED, PER LAND (Track A A5b): runkod emits a
# `runko-image-build` repository_dispatch on every change.landed
# (runkod/githubdispatch.go), carrying the landed head_sha. This workflow
# builds exactly that commit's affected images - a tight head^..head delta
# per land, NOT a batched before..after mirror-push range (which unioned
# multiple lands and reported to the tip, stranding intermediate lands'
# records). It replaces the old `on: push` trigger.
#
# GENERIC EXECUTOR (§14.9.1): the image matrix - which images, and each
# one's context/dockerfile/build_args - comes ENTIRELY from
# `runko-ci images`, which reads the tree's `deploy.image` declarations.
# This workflow names no images and no build config; adding/renaming an
# image or changing a build arg is a single-manifest change. The daemon's
# deploy record uses the SAME platform/deploy derivation over the same head,
# so the built set and the record's expected set agree by construction
# (Track A A4 landed the daemon flip first, as required).
#
# The `cli-latest` binary release stays `affected`-scoped: the CLI is not an
# image, so `runko-ci images` can never express it.
#
# Secrets: RUNKO_URL (the org mount, e.g. https://<host>/o/runko),
# RUNKO_CI_TOKEN.
name: Release images

run-name: "images: ${{ github.event.client_payload.change_id }}@${{ github.event.client_payload.head_sha }}"

on:
  repository_dispatch:
    types: [runko-image-build]

permissions:
  # contents: write is for the rolling cli-latest release (tag + assets);
  # main itself stays untouchable (the freeze ruleset targets the branch).
  contents: write
  packages: write

# One in-flight build per landed commit; never cancel a running build - each
# land's images must complete to fill that land's deploy record.
concurrency:
  group: release-images-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: false

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}
  RUNKO_URL: ${{ secrets.RUNKO_URL }}
  RUNKO_CI_TOKEN: ${{ secrets.RUNKO_CI_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      # matrix: [{name, context, dockerfile, build_args}] from runko-ci images
      # (build_args pre-rendered to newline KEY=VALUE for build-push-action).
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_images: ${{ steps.resolve.outputs.has_images }}
      cli: ${{ steps.resolve.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: check out the landed head (mirror-lag retry)
        run: |
          # The dispatch can beat the debounced mirror push; retry until the
          # landed commit is present, then build exactly it.
          for i in $(seq 1 30); do
            git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null && break
            git fetch --quiet origin main 2>/dev/null || true
            sleep 5
          done
          git checkout -q "$HEAD_SHA"
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: locate runko-ci
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - name: resolve the image matrix + cli flag from the tree
        id: resolve
        run: |
          # head^..head is the single-land delta (the payload's documented
          # preference). runko-ci images reads deploy.image from the tree and
          # already handles run_everything (returns every declared image);
          # no --engine (fail closed - a narrower set than the record expects
          # would strand the rollout). A hard failure here reports no digests,
          # so the record stays pending - visible, never a silent wrong set.
          #
          # INVARIANT: the daemon's deploy record must be computed with the
          # SAME inputs. Prod runkod leaves RUNKO_ROOT_INVALIDATION unset
          # (tree-borne only), so this CLI call matches it. If an operator
          # ever sets that flag, the daemon's expected set widens beyond what
          # is built here -> stranded rollout; pass the same patterns here too.
          BASE="$HEAD_SHA^"
          IMAGES=$(go run "$RUNKO_CI_PKG" images --base "$BASE" --head "$HEAD_SHA")
          echo "$IMAGES" | jq .
          # Pre-render build_args map -> "KEY=VALUE\nKEY2=VALUE2" for
          # docker/build-push-action; empty map -> "". `.images` is null (not
          # []) for a non-deployable land, so coalesce before iterating.
          MATRIX=$(echo "$IMAGES" | jq -c '[(.images // [])[] | {
            name, context, dockerfile,
            build_args: ((.build_args // {}) | to_entries | map("\(.key)=\(.value)") | join("\n"))
          }]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_images=$(echo "$IMAGES" | jq -r '.images | length > 0')" >> "$GITHUB_OUTPUT"
          # The cli-latest binary release is not an image: keep affected.
          AFF=$(go run "$RUNKO_CI_PKG" affected --base "$BASE" --head "$HEAD_SHA")
          cli=false
          if [ "$(echo "$AFF" | jq -r '.RunEverything')" = "true" ]; then
            cli=true
          else
            for n in $(echo "$AFF" | jq -r '[.Projects[].Name] | join(" ")'); do
              case "$n" in cli|platform|internal|db) cli=true ;; esac
            done
          fi
          echo "cli=$cli" >> "$GITHUB_OUTPUT"

  images:
    needs: setup
    if: needs.setup.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:latest
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:sha-${{ env.HEAD_SHA }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
      # One artifact per matrix leg (legs writing the same job output clobber).
      - name: record image digest for the deploy report
        run: |
          mkdir -p digest
          printf '%s' "${{ steps.build.outputs.digest }}" > "digest/${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: digest/${{ matrix.name }}

  # Report each built image's digest to the deploy record runkod opened for
  # this land (keyed by the LANDED head_sha, not a push tip). Once every
  # expected image reports, runkod emits deploy.images_ready -> runko-deployer
  # pins the digests -> Argo CD rolls.
  report:
    needs: images
    # Report even when some image legs failed (fail-fast: false), so the
    # digests that DID build reach the record immediately; only skip when the
    # images job was skipped entirely (a non-deployable land - no record).
    if: ${{ !cancelled() && needs.images.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: digest-*
          path: digests
      - name: report built image digests to Runko
        run: |
          shopt -s nullglob
          for f in digests/digest-*/*; do
            name=$(basename "$f"); digest=$(cat "$f")
            [ -n "$digest" ] || continue
            go run ./cli/runko-ci report-image \
              --url "$RUNKO_URL/api/deploys/${HEAD_SHA}/images" \
              --token "$RUNKO_CI_TOKEN" \
              --image "$name" \
              --image-ref "ghcr.io/saxocellphone/runko/${name}" \
              --digest "$digest" \
              --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --reporter github-actions
          done

  # Rolling GitHub binary release for the CLIs (runko + runko-ci): rebuilt
  # whenever the cli input set changed, published as the `cli-latest`
  # release with per-platform assets + checksums. The tag exists only on
  # GitHub (the mirror pushes runko-side tags and never prunes foreign
  # ones, so no divergence is possible). `go install .../cli/runko@latest`
  # remains the from-source alternative.
  cli-release:
    needs: setup
    if: needs.setup.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: cross-compile runko + runko-ci
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${target%/*}; GOARCH=${target#*/}
            EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
            for bin in runko runko-ci; do
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/${bin}_${GOOS}_${GOARCH}${EXT}" "./cli/${bin}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist/
      - name: publish rolling cli-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete cli-latest --cleanup-tag -y || true
          gh release create cli-latest \
            --target "${HEAD_SHA}" \
            --title "runko CLI (rolling, main @ ${HEAD_SHA:0:9})" \
            --notes "Rolling build of the \`runko\` and \`runko-ci\` CLIs from main @ ${HEAD_SHA:0:9}. Updated automatically whenever a landing affects the CLI or its dependencies. Verify with checksums.txt. From source: \`go install github.com/saxocellphone/runko/cli/runko@latest\`." \
            dist/*
