# Build + push the deployable images to GHCR on every push to main
# (consumed by the k8s-cluster GitOps repo's apps/monorepo-platform).
# Tags: :latest (dev-follow) and :sha-<commit> (pinnable). Uses the
# workflow's own GITHUB_TOKEN - no PAT.
name: Release images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: runkod
            context: .
            dockerfile: Dockerfile
          - name: web
            context: web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:latest
            ghcr.io/saxocellphone/runko/${{ matrix.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
