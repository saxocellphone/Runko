# POST-LAND safety net (since the 2026-07-09 self-host cutover): main only
# moves via Runko's mirror, and pre-land gating happens in runko-checks.yml
# against the change's HEAD. Landing REBASES onto trunk, and §13.5's
# optimistic revalidation deliberately skips re-running checks when the
# trunk delta doesn't intersect the affected set - so this workflow is the
# only CI that ever builds the actually-landed tree. A failure here means
# "trunk is red, fix forward", never a blocked land. The pull_request /
# merge_group triggers died with the cutover (no PRs, no GitHub merge
# queue); the bazel job moved to runko-checks.yml as the tree-declared
# `bazel-check` (make check-bazel).
name: CI

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # Real Postgres service container (docs/design.md §28.3 stage 9d) - the
    # live-Postgres tests added in stage 9a (internal/dbtest, index/receive/
    # checks' *_pg_test.go) could not be executed in the sandbox this repo
    # was originally built in (no Docker/Postgres there - see CLAUDE.md).
    # This is the first environment that actually runs them.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runko
          POSTGRES_PASSWORD: runko
          POSTGRES_DB: runko_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # jj is the primary client (§7.4, decided 2026-07-08): cmd/runko's jj
      # tests skip without the binary, so install it here to run them for
      # real - otherwise CI would silently never execute the evolve
      # workflow tests.
      - name: Install jj (jj-first client tests)
        run: |
          curl -fsSL https://github.com/jj-vcs/jj/releases/download/v0.43.0/jj-v0.43.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin ./jj
          jj --version

      - name: make check (fmt + vet + test, no live Postgres needed)
        run: make check

      - name: make check-race (race detector over the whole suite)
        run: make check-race

      - name: Ensure psql client is installed
        run: command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: make check-db (live-Postgres integration tests, §28.3 stage 9a)
        env:
          RUNKO_TEST_DATABASE_URL: postgres://runko:runko@localhost:5432/runko_test?sslmode=disable
        run: make check-db

  # Web frontend (§28.3 stage 13): typecheck + lint + vitest + build.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run check

  # The §16.4 measured eval loop (§28.3 stage 14): compose up -> create
  # project -> change -> land (twice - the second pass is the "edit" leg),
  # timed end to end against §3.3's < 15 min budget, gated by real policy
  # (owner approval with self-approval denied + a required check). Runs on
  # every push so the claim cannot rot. This job is the loop's FIRST real
  # execution environment - the sandbox this repo is developed in has no
  # Docker (see CLAUDE.md), the same gap CI already closes for Postgres.
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: compose eval loop, timed (§16.4)
        run: make check-compose

      # The invariants that only mean something through the full transport
      # (docs/smoke-plan.md): §6.9 trunk closure, real gitleaks, agent
      # policy at receive, amend gate-resets, §13.5 revalidation, workspace
      # owner-only push, restart durability, /metrics, MCP. Runs on the
      # image layers the timed loop just built, against a fresh stack.
      - name: compose edge cases (docs/smoke-plan.md)
        run: make check-compose-edges
