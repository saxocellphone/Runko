# Runko-specific: the rolling `cli-latest` GitHub binary release for the runko
# + runko-ci CLIs, rebuilt whenever a landing affects the CLI or its deps
# (§17.1). A binary release is NOT an image, so `runko-ci images` cannot
# express it - it lives here rather than in the generic release-images.yml.
# Same runko-image-build dispatch as the image build (per land, carries
# head_sha). The tag exists only on GitHub (the mirror pushes runko-side tags
# and never prunes foreign ones, so no divergence).
name: CLI release

run-name: "cli-release: ${{ github.event.client_payload.head_sha }}"

on:
  repository_dispatch:
    types: [runko-image-build]

permissions:
  contents: write # the cli-latest release tag + assets

concurrency:
  group: cli-release-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: false

env:
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}

jobs:
  cli-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: check out the landed head (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null && break
            git fetch --quiet origin main 2>/dev/null || true
            sleep 5
          done
          git checkout -q "$HEAD_SHA"
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: is the CLI affected? (not an image - keep affected-scoped)
        id: scope
        run: |
          RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)
          AFF=$(go run "$RUNKO_CI_PKG" affected --base "$HEAD_SHA^" --head "$HEAD_SHA")
          cli=false
          if [ "$(echo "$AFF" | jq -r '.RunEverything')" = "true" ]; then
            cli=true
          else
            for n in $(echo "$AFF" | jq -r '[.Projects[].Name] | join(" ")'); do
              case "$n" in cli|platform|internal|db) cli=true ;; esac
            done
          fi
          echo "cli=$cli" >> "$GITHUB_OUTPUT"
      - name: cross-compile runko + runko-ci
        if: steps.scope.outputs.cli == 'true'
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${target%/*}; GOARCH=${target#*/}
            EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
            for bin in runko runko-ci; do
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/${bin}_${GOOS}_${GOARCH}${EXT}" "./cli/${bin}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist/
      - name: publish rolling cli-latest release
        if: steps.scope.outputs.cli == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete cli-latest --cleanup-tag -y || true
          gh release create cli-latest \
            --target "${HEAD_SHA}" \
            --title "runko CLI (rolling, main @ ${HEAD_SHA:0:9})" \
            --notes "Rolling build of the \`runko\` and \`runko-ci\` CLIs from main @ ${HEAD_SHA:0:9}. Updated automatically whenever a landing affects the CLI or its dependencies. Verify with checksums.txt. From source: \`go install github.com/saxocellphone/runko/cli/runko@latest\`." \
            dist/*
