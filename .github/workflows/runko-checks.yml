# Pre-land checks for Runko-hosted Changes (§14.4 Mode C).
#
# AFFECTED-SCOPED (§14.5): a `setup` job computes the change's affected
# projects (runko-ci affected over base..head - the SAME computation the
# server's merge gate uses) and every check job is gated + scoped to it.
# A cli-only change runs `go test ./cli/...`, not the whole suite; a
# docs-only change runs only bazel-check; a web-only change runs only
# web-check. Check NAMES are unchanged (platform-check/-race/-db/
# bazel-check/web-check), so the merge gate is untouched - only what each
# job EXECUTES narrows. See docs/design.md §14.5.
#
# Flow: change pushed to the runko org -> runkod webhook -> runko-bridge ->
# repository_dispatch here -> each job fetches the change ref FROM THE
# MIRROR (this repo), runs its (scoped) check, and reports back with
# runko-ci report-check. repository_dispatch only ever runs the DEFAULT
# branch's copy, so this must land on GitHub main before it takes effect.
#
# Secrets: RUNKO_URL (e.g. https://<host>/o/runko), RUNKO_CI_TOKEN.
name: Runko checks

on:
  repository_dispatch:
    types: [runko-change]

concurrency:
  group: runko-${{ github.event.client_payload.change_id }}-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: true

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}
  BASE_SHA: ${{ github.event.client_payload.base_sha }}
  GIT_REF: ${{ github.event.client_payload.git_ref }}
  RUNKO_URL: ${{ secrets.RUNKO_URL }}
  RUNKO_CI_TOKEN: ${{ secrets.RUNKO_CI_TOKEN }}

jobs:
  # Compute what the change actually affects, once, and hand every other
  # job a scope. run_everything (an unowned root path, or an engine
  # escalation) fails OPEN to the whole repo - the same fail-closed bias
  # the merge gate takes.
  setup:
    runs-on: ubuntu-latest
    outputs:
      go_needed: ${{ steps.scope.outputs.go_needed }}
      web_needed: ${{ steps.scope.outputs.web_needed }}
      docs_needed: ${{ steps.scope.outputs.docs_needed }}
      go_scope: ${{ steps.scope.outputs.go_scope }}
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: compute affected scope
        id: scope
        run: |
          # Fail OPEN to the whole repo on ANY uncertainty - an empty base
          # (first change on an unborn trunk) or an affected error must run
          # every check, never skip them all (which would deadlock the
          # gate: required checks with no job to report them).
          run_everything() {
            {
              echo "go_needed=true"; echo "web_needed=true"; echo "docs_needed=true"
              echo "go_scope=./..."
            } >> "$GITHUB_OUTPUT"
            exit 0
          }
          [ -n "$BASE_SHA" ] || run_everything
          # base_sha is an ancestor of head (merge-base with trunk), so it
          # is already present after fetching the change ref.
          AFF=$(go run "$RUNKO_CI_PKG" affected --base "$BASE_SHA" --head "$HEAD_SHA") || run_everything
          echo "$AFF"
          RE=$(echo "$AFF" | jq -r '.RunEverything')
          if [ "$RE" != "false" ]; then
            run_everything
          fi
          GO_SCOPE=""; GO_NEEDED=false; WEB_NEEDED=false; DOCS_NEEDED=false
          while IFS=$'\t' read -r name path; do
            case "$name" in
              repo)                         GO_SCOPE="./..."; GO_NEEDED=true ;;
              platform|runkod|cli|internal|proto)
                                            GO_SCOPE="$GO_SCOPE ./$path/..."; GO_NEEDED=true ;;
              web)                          WEB_NEEDED=true ;;
              docs)                         DOCS_NEEDED=true ;;
              db)                           : ;;  # SQL only; its Go consumers are pulled in via the dep closure
            esac
          done < <(echo "$AFF" | jq -r '.Projects[] | [.Name, .Path] | @tsv')
          # A root/repo change scopes to everything - drop the redundant
          # per-project globs to keep `go test` from double-listing.
          case " $GO_SCOPE " in *" ./... "*) GO_SCOPE="./..." ;; esac
          {
            echo "go_needed=$GO_NEEDED"; echo "web_needed=$WEB_NEEDED"; echo "docs_needed=$DOCS_NEEDED"
            echo "go_scope=$(echo $GO_SCOPE | xargs)"
          } >> "$GITHUB_OUTPUT"

  platform-check:
    needs: setup
    if: needs.setup.outputs.go_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-check --external-id "${{ github.run_id }}-check" \
            --status in_progress --reporter github-actions
      - name: Install jj (jj-first client tests)
        run: |
          curl -fsSL https://github.com/jj-vcs/jj/releases/download/v0.43.0/jj-v0.43.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin ./jj
      - name: fmt + vet + test (scoped)
        run: |
          gofmt -l . | (! grep .)
          go vet ${{ needs.setup.outputs.go_scope }}
          go test ${{ needs.setup.outputs.go_scope }}
      - name: report result
        # success() || failure() excludes CANCELLED (migration-findings #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-check --external-id "${{ github.run_id }}-check" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  platform-race:
    needs: setup
    if: needs.setup.outputs.go_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-race --external-id "${{ github.run_id }}-race" \
            --status in_progress --reporter github-actions
      - name: race (scoped)
        run: go test -race ${{ needs.setup.outputs.go_scope }}
      - name: report result
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-race --external-id "${{ github.run_id }}-race" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  platform-db:
    needs: setup
    if: needs.setup.outputs.go_needed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runko
          POSTGRES_PASSWORD: runko
          POSTGRES_DB: runko_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-db --external-id "${{ github.run_id }}-db" \
            --status in_progress --reporter github-actions
      - name: Ensure psql client is installed
        run: command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: db integration tests (scoped)
        env:
          RUNKO_TEST_DATABASE_URL: postgres://runko:runko@localhost:5432/runko_test?sslmode=disable
        run: go test -run Postgres -p 1 ${{ needs.setup.outputs.go_scope }}
      - name: report result
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-db --external-id "${{ github.run_id }}-db" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  # Build-graph health: inherently whole-repo (gazelle drift is global), so
  # it is NOT scoped. Runs when Go OR docs is affected - docs declares
  # bazel-check as its cheap always-relevant gate (a docs change may touch
  # a BUILD file; pure prose is a fast no-op).
  bazel-check:
    needs: setup
    if: needs.setup.outputs.go_needed == 'true' || needs.setup.outputs.docs_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: bazel-${{ github.workflow }}
          repository-cache: true
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name bazel-check --external-id "${{ github.run_id }}-bazel" \
            --status in_progress --reporter github-actions
      - run: make check-bazel
      - name: runko-ci affected --engine bazel smoke
        run: |
          git config user.name ci && git config user.email ci@localhost
          printf '\n// bazel-smoke\n' >> platform/land/land.go
          git commit -am bazel-smoke
          go run "$RUNKO_CI_PKG" affected --base HEAD~1 --head HEAD \
            --engine bazel --universe //... --engine-timeout 300s | tee affected.json
          jq -e '.build_refinement.run_everything == false and (.build_refinement.targets | length > 0)' affected.json
          jq -e '.RunEverything == false and ([.Projects[].Name] | index("platform") != null)' affected.json
          git reset --hard HEAD~1
      - name: report result
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name bazel-check --external-id "${{ github.run_id }}-bazel" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  web-check:
    needs: setup
    if: needs.setup.outputs.web_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name web-check --external-id "${{ github.run_id }}-web" \
            --status in_progress --reporter github-actions
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - name: report result
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name web-check --external-id "${{ github.run_id }}-web" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions
