# Pre-land checks for Runko-hosted Changes (§14.4 Mode C, the R3 slice of
# docs/migration-findings.md's self-host migration).
#
# Flow: a change is pushed to the runkod org -> runkod webhook ->
# runko-bridge translates the signed envelope into a repository_dispatch
# here -> each job fetches refs/changes/<id>/head FROM THE MIRROR (this
# repo; the webhook can beat the 3s-debounced mirror sync, hence the fetch
# retry loop), runs its check, and reports back with runko-ci report-check
# using the check names PROJECT.yaml's ci.checks declares. This workflow is
# inert until dispatched - repository_dispatch only ever runs the DEFAULT
# branch's copy, which is why it must land on GitHub main before cutover.
#
# Secrets: RUNKO_URL (e.g. https://<host>/o/runko), RUNKO_CI_TOKEN (a
# non-agent, non-admin runkod principal for CI reporting).
name: Runko checks

on:
  repository_dispatch:
    types: [runko-change]

concurrency:
  group: runko-${{ github.event.client_payload.change_id }}-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: true

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}
  GIT_REF: ${{ github.event.client_payload.git_ref }}
  RUNKO_URL: ${{ secrets.RUNKO_URL }}
  RUNKO_CI_TOKEN: ${{ secrets.RUNKO_CI_TOKEN }}

jobs:
  platform-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      # Layout-agnostic runko-ci location: the checkout may predate or
      # postdate the cmd/ -> cli/ restructure, and repository_dispatch
      # always runs the DEFAULT branch's copy of this workflow.
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-check --external-id "${{ github.run_id }}-check" \
            --status in_progress --reporter github-actions
      - name: Install jj (jj-first client tests)
        run: |
          curl -fsSL https://github.com/jj-vcs/jj/releases/download/v0.43.0/jj-v0.43.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin ./jj
      - run: make check
      - name: report result
        # success() || failure() excludes CANCELLED - a cancelled run must not
        # report check failure (docs/migration-findings.md #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-check --external-id "${{ github.run_id }}-check" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  platform-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      # Layout-agnostic runko-ci location: the checkout may predate or
      # postdate the cmd/ -> cli/ restructure, and repository_dispatch
      # always runs the DEFAULT branch's copy of this workflow.
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-race --external-id "${{ github.run_id }}-race" \
            --status in_progress --reporter github-actions
      - run: make check-race
      - name: report result
        # success() || failure() excludes CANCELLED - a cancelled run must not
        # report check failure (docs/migration-findings.md #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-race --external-id "${{ github.run_id }}-race" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  platform-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runko
          POSTGRES_PASSWORD: runko
          POSTGRES_DB: runko_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      # Layout-agnostic runko-ci location: the checkout may predate or
      # postdate the cmd/ -> cli/ restructure, and repository_dispatch
      # always runs the DEFAULT branch's copy of this workflow.
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-db --external-id "${{ github.run_id }}-db" \
            --status in_progress --reporter github-actions
      - name: Ensure psql client is installed
        run: command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: make check-db
        env:
          RUNKO_TEST_DATABASE_URL: postgres://runko:runko@localhost:5432/runko_test?sslmode=disable
        run: make check-db
      - name: report result
        # success() || failure() excludes CANCELLED - a cancelled run must not
        # report check failure (docs/migration-findings.md #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name platform-db --external-id "${{ github.run_id }}-db" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  # Bazel graph health as a pre-land gate (was ci.yml's post-land bazel
  # job until 2026-07-09): build green, no gazelle drift, real-engine
  # integration test, plus the affected-engine smoke - now asserting the
  # PROJECT-level result too, since the re-carve manifests exist
  # (closes docs/migration-findings.md's open verification item).
  bazel-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      # Layout-agnostic runko-ci location: the checkout may predate or
      # postdate the cmd/ -> cli/ restructure, and repository_dispatch
      # always runs the DEFAULT branch's copy of this workflow.
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: bazel-${{ github.workflow }}
          repository-cache: true
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name bazel-check --external-id "${{ github.run_id }}-bazel" \
            --status in_progress --reporter github-actions
      - run: make check-bazel
      # The dogfood payload: a synthetic Go-file change refined through the
      # real graph. Touches a GO file deliberately: the engine's file
      # labels error on non-package files (docs/*.md) and escalate, per
      # spec. Asserts both layers: the engine refinement AND the
      # project-level result (platform must be matched, no fail-closed
      # escalation) now that the manifests exist.
      - name: runko-ci affected --engine bazel smoke
        run: |
          git config user.name ci && git config user.email ci@localhost
          printf '\n// bazel-smoke\n' >> platform/land/land.go
          git commit -am bazel-smoke
          go run "$RUNKO_CI_PKG" affected --base HEAD~1 --head HEAD \
            --engine bazel --universe //... --engine-timeout 300s | tee affected.json
          jq -e '.build_refinement.run_everything == false and (.build_refinement.targets | length > 0)' affected.json
          jq -e '.RunEverything == false and ([.Projects[].Name] | index("platform") != null)' affected.json
          git reset --hard HEAD~1
      - name: report result
        # success() || failure() excludes CANCELLED - a cancelled run must not
        # report check failure (docs/migration-findings.md #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name bazel-check --external-id "${{ github.run_id }}-bazel" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions

  # Only when the change's affected set includes the web project - the
  # platform jobs run regardless (the root project matches every path).
  web-check:
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.client_payload.affected_projects), '"web"')
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      # Layout-agnostic runko-ci location: the checkout may predate or
      # postdate the cmd/ -> cli/ restructure, and repository_dispatch
      # always runs the DEFAULT branch's copy of this workflow.
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name web-check --external-id "${{ github.run_id }}-web" \
            --status in_progress --reporter github-actions
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - name: report result
        # success() || failure() excludes CANCELLED - a cancelled run must not
        # report check failure (docs/migration-findings.md #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name web-check --external-id "${{ github.run_id }}-web" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions
