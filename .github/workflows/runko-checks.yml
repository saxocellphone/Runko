# Pre-land checks for Runko-hosted Changes (§14.4 Mode C) - the GENERIC
# EXECUTOR of tree-declared policy (§14.9 encapsulation):
#
#   setup: runko-ci checks --base --head   -> [{project, name, command}]
#   run:   one matrix job per check        -> bash -c "$command", report by name
#
# This workflow knows NO project names, NO check commands, and NO per-check
# environments - each project's PROJECT.yaml owns its checks, and the merge
# gate resolves required names from the SAME head tree runko-ci reads here,
# so the two can never disagree. Adding or renaming a check is a
# single-manifest change; this file only changes when the executor contract
# does.
#
# The runner contract every check command may rely on: repo checked out at
# the change head; go / bazelisk / node / jj / psql installed; a postgres:16
# service with RUNKO_TEST_DATABASE_URL exported (checks opt in by reading
# it - pg-gated tests skip where it's absent, e.g. locally).
#
# Flow: change pushed to the runko org -> runkod webhook -> runko-bridge ->
# repository_dispatch here -> jobs fetch the change ref FROM THE MIRROR
# (this repo; the webhook can beat the debounced mirror push, hence the
# fetch retry), run, and report back with runko-ci report-check (retrying
# transient 5xx, migration-findings #33). repository_dispatch runs the
# DEFAULT branch's copy of this file - but since check definitions live in
# the manifests, that coupling now covers only the executor itself.
#
# A setup failure means no checks report and the gate stays pending -
# visible, rerunnable, and fail-closed (a required check is never silently
# skipped; run_everything resolves every project's checks).
#
# Secrets: RUNKO_URL (e.g. https://<host>/o/runko), RUNKO_CI_TOKEN.
name: Runko checks

on:
  repository_dispatch:
    types: [runko-change]

concurrency:
  group: runko-${{ github.event.client_payload.change_id }}-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: true

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}
  BASE_SHA: ${{ github.event.client_payload.base_sha }}
  GIT_REF: ${{ github.event.client_payload.git_ref }}
  RUNKO_URL: ${{ secrets.RUNKO_URL }}
  RUNKO_CI_TOKEN: ${{ secrets.RUNKO_CI_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_checks: ${{ steps.resolve.outputs.has_checks }}
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: resolve the check matrix from the manifests
        id: resolve
        run: |
          # An empty base (first change on an unborn trunk) has no diff
          # range; `checks` itself fails closed to run_everything on any
          # unowned path, and a hard failure here leaves the gate pending
          # (never green), so no fallback matrix is needed.
          OUT=$(go run "$RUNKO_CI_PKG" checks --base "$BASE_SHA" --head "$HEAD_SHA")
          echo "$OUT" | jq .
          echo "matrix=$(echo "$OUT" | jq -c '.checks')" >> "$GITHUB_OUTPUT"
          echo "has_checks=$(echo "$OUT" | jq -r '.checks | length > 0')" >> "$GITHUB_OUTPUT"

  run-checks:
    needs: setup
    if: needs.setup.outputs.has_checks == 'true'
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runko
          POSTGRES_PASSWORD: runko
          POSTGRES_DB: runko_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUNKO_TEST_DATABASE_URL: postgres://runko:runko@localhost:5432/runko_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success() || failure(): the report-result step needs this even
        # when the change-ref fetch failed - a skipped locate left
        # RUNKO_CI_PKG empty and `go run ""` broke reporting exactly on
        # the failure path, so runkod showed pending forever (found live).
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      # Runner-contract toolchains: one fixed set for every check for now; a
      # `tools:` field on ci.checks is the declarative narrowing path.
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: bazel-${{ matrix.name }}
          repository-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install jj + ensure psql (runner contract)
        run: |
          command -v jj >/dev/null || curl -fsSL https://github.com/jj-vcs/jj/releases/download/v0.43.0/jj-v0.43.0-x86_64-unknown-linux-musl.tar.gz | sudo tar -xz -C /usr/local/bin ./jj
          command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name "${{ matrix.name }}" --external-id "${{ github.run_id }}-${{ strategy.job-index }}" \
            --status in_progress --reporter github-actions
      - name: run ${{ matrix.name }} (declared by ${{ matrix.project }})
        run: bash -c "${{ matrix.command }}"
      - name: report result
        # success() || failure() excludes CANCELLED (migration-findings #28).
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name "${{ matrix.name }}" --external-id "${{ github.run_id }}-${{ strategy.job-index }}" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions
