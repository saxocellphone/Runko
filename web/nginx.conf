# SPA serving config for the web image (react-router BrowserRouter needs
# the index.html fallback). The unprivileged nginx base listens on 8080.
#
# Cache-Control here is the single source of truth for EDGE caching too:
# the Cloudflare cache rule in front of the public host is configured
# "use cache-control header if present, bypass if not", so what each
# location declares below is exactly what the CDN serves without touching
# the origin. HTML is deliberately short-lived (5 min): it names hashed
# asset URLs, so a deploy must propagate quickly; the assets themselves
# are content-addressed and cache for a year. Nothing here varies by
# user - auth is header-borne on the API, never cookies, and the shell
# is identical for everyone - so `public` is safe on all of it.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Unhashed statics (favicon, landing extras): cacheable but with a
    # bounded TTL, since their URLs don't change when their bytes do.
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    location /landing/ {
        add_header Cache-Control "public, max-age=3600";
        # $uri/index.html: try_files does NOT fall back to the index
        # directive, so bare /landing/ (every in-product "What is Runko?"
        # link, the login gate's footer) 404ed while /landing/index.html
        # worked - found live when the landing CTAs shipped (§15.1).
        try_files $uri $uri/index.html =404;
    }

    # The bare domain is the product landing page (web/public/landing/);
    # the app lives at its real routes (/changes, /projects, ...) - the
    # SPA's own root route redirects to /changes anyway, so no app URL is
    # lost by giving "/" to the pitch.
    location = / {
        add_header Cache-Control "public, max-age=300";
        try_files /landing/index.html =404;
    }

    location / {
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/ /index.html;
    }
}
