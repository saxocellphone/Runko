schema: project/v1
name: web
type: app
language: ts
# The TS client types in src/gen are generated from proto/ - a proto
# change must re-run web-check via the affected closure.
dependencies:
  - proto
# The command runs from the repo root (the §14.9 executor contract gives
# checks no working-directory of their own), so it scopes itself.
ci:
  checks:
    - name: web-check
      command: cd web && npm ci && npm run check
