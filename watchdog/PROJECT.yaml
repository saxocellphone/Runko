# runko-watchdog - the CI reconciler (§14.4.2's staleness rule grown an
# actor): a required check stuck non-terminal in Runko while its GitHub
# Actions run already finished gets its REAL conclusion force-reported;
# a check whose dispatch was lost entirely (never reported at all) gets
# one rescue rerun. Closes the "CI failed on GitHub but Runko never
# heard" failure mode observed twice in dogfood (2026-07-08/10).
#
# Checks are OWNED here (§14.9): scoped to //watchdog/... . No -race
# check on purpose: one sequential sweep loop, no concurrent surface.
schema: project/v1
name: watchdog
type: service
language: go
# deploy (§14.10, docs/spec/deploy/README.md): watchdog owns no image - its
# binary ships INSIDE the runkod image (built by the root Dockerfile), so
# it RIDES that image; a watchdog-only change rebuilds the runkod image.
capabilities:
  - deploy
capability_config:
  deploy:
    workloads:
      - name: runko-watchdog
        image: runkod
dependencies:
  - platform
# consumes (§13.3.1, 2026-07-14 re-evaluation): the ORIGINAL stub-pinned
# REST client - it polls /api/changes and merge-requirements with what
# was, until finding #47, zero declared relation to runkod. Same OpenAPI
# caveat as cli: narrow trigger surface until runkod's REST artifact
# lands.
consumes:
  - runkod
ci:
  checks:
    - name: watchdog-test
      command: bazel test --test_output=errors //watchdog/...
    - name: bazel-check
      command: make check-bazel
