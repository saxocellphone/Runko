# Runko CI template — pre-land checks (copy to .github/workflows/).
#
# The generic executor of your tree-declared checks (§14.9). Runko dispatches
# `runko-change` for every pushed Change; this workflow asks `runko-ci checks`
# which checks the change's affected projects declare (their PROJECT.yaml
# `ci.checks`), runs each, and reports the result back so the merge gate can
# require them. This file knows NO project names and NO check commands — those
# live in the manifests, so adding/renaming a check is a single-manifest change
# and this file never changes.
#
# ADJUST the RUNNER CONTRACT (marked below): the toolchains and services your
# check commands need (a database, a build tool, a language runtime). The
# template ships with Go only (required to run runko-ci itself) plus commented
# examples; add what your `ci.checks` commands actually invoke.
#
# SETUP (see templates/ci/README.md):
#   - Secrets: RUNKO_URL (your org mount), RUNKO_CI_TOKEN.
#   - `runko github connect` wires the runko-change dispatch to this repo.
name: Runko checks

run-name: "checks: ${{ github.event.client_payload.change_id }}@${{ github.event.client_payload.head_sha }}"

on:
  repository_dispatch:
    types: [runko-change]

concurrency:
  group: runko-${{ github.event.client_payload.change_id }}-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: true

env:
  CHANGE_ID: ${{ github.event.client_payload.change_id }}
  HEAD_SHA: ${{ github.event.client_payload.head_sha }}
  BASE_SHA: ${{ github.event.client_payload.base_sha }}
  GIT_REF: ${{ github.event.client_payload.git_ref }}
  RUNKO_URL: ${{ secrets.RUNKO_URL }}
  RUNKO_CI_TOKEN: ${{ secrets.RUNKO_CI_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      has_checks: ${{ steps.resolve.outputs.has_checks }}
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with: { go-version: '1.25', cache: true }
      - name: resolve the check matrix from the manifests
        id: resolve
        run: |
          # `checks` fails closed to run_everything on any unowned path; a hard
          # failure here leaves the gate pending (never green), so no fallback
          # matrix is needed.
          OUT=$(go run "$RUNKO_CI_PKG" checks --base "$BASE_SHA" --head "$HEAD_SHA")
          echo "$OUT" | jq .
          echo "matrix=$(echo "$OUT" | jq -c '.checks')" >> "$GITHUB_OUTPUT"
          echo "has_checks=$(echo "$OUT" | jq -r '.checks | length > 0')" >> "$GITHUB_OUTPUT"

  run-checks:
    needs: setup
    if: needs.setup.outputs.has_checks == 'true'
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    # ---------------------------------------------------------------------
    # RUNNER CONTRACT (ADJUST): services your check commands need. Example -
    # a Postgres your integration tests read via an env var. Delete if unused.
    # services:
    #   postgres:
    #     image: postgres:16
    #     env: { POSTGRES_USER: ci, POSTGRES_PASSWORD: ci, POSTGRES_DB: ci_test }
    #     ports: ["5432:5432"]
    #     options: >-
    #       --health-cmd pg_isready --health-interval 5s
    #       --health-timeout 5s --health-retries 10
    # env:
    #   YOUR_TEST_DATABASE_URL: postgres://ci:ci@localhost:5432/ci_test?sslmode=disable
    # ---------------------------------------------------------------------
    steps:
      - uses: actions/checkout@v4
      - name: fetch the change ref (mirror-lag retry)
        run: |
          for i in $(seq 1 30); do
            if git fetch origin "$GIT_REF" 2>/dev/null && [ "$(git rev-parse FETCH_HEAD)" = "$HEAD_SHA" ]; then
              git checkout -q FETCH_HEAD; break
            fi
            sleep 5
          done
          [ "$(git rev-parse HEAD)" = "$HEAD_SHA" ]
      - name: locate runko-ci
        # success()||failure(): the report step must run even if the fetch
        # failed, or a broken run reports nothing and the gate sits pending.
        if: success() || failure()
        run: echo "RUNKO_CI_PKG=$([ -d cli/runko-ci ] && echo ./cli/runko-ci || echo ./cmd/runko-ci)" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        if: success() || failure()
        with: { go-version: '1.25', cache: true }
      # --- RUNNER CONTRACT (ADJUST): toolchains your checks invoke. ---
      # - uses: bazel-contrib/setup-bazel@0.15.0
      # - uses: actions/setup-node@v4
      #   with: { node-version: '24', cache: npm }
      # ---------------------------------------------------------------
      # First report is already clickable in the Runko UI; the completed
      # report overwrites with the same URL.
      - name: report in_progress
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name "${{ matrix.name }}" --external-id "${{ github.run_id }}-${{ strategy.job-index }}" \
            --status in_progress --reporter github-actions \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
      - name: run ${{ matrix.name }} (declared by ${{ matrix.project }})
        run: bash -c "${{ matrix.command }}"
      - name: report result
        # success()||failure() excludes CANCELLED.
        if: success() || failure()
        run: |
          go run "$RUNKO_CI_PKG" report-check --url "$RUNKO_URL/api/changes/$CHANGE_ID/checks" \
            --token "$RUNKO_CI_TOKEN" --name "${{ matrix.name }}" --external-id "${{ github.run_id }}-${{ strategy.job-index }}" \
            --status completed --conclusion ${{ job.status == 'success' && 'success' || 'failure' }} \
            --details-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --reporter github-actions
