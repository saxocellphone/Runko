version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "dbgen"
        out: "internal/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_result_struct_pointers: true
        emit_methods_with_db_argument: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
