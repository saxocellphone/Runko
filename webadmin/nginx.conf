# Deployment admin panel - static SPA under /admin, its OWN pod: the
# panel stays reachable when the main web app or runkod itself is down
# (the app's health strip renders the outage). The unprivileged nginx
# base listens on 8080. Cache-Control here is the single source of truth
# for edge caching too (see web/nginx.conf for the reasoning); the shell
# is identical for everyone - auth is header-borne on the API, never
# cookies - so `public` is safe.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Hashed build assets are immutable.
    location /admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/ /admin/index.html;
    }

    # Anything else that reaches this pod (probes, stray links) goes to
    # the panel - it serves nothing but the panel.
    location / {
        return 302 /admin/;
    }
}
